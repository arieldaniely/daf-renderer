<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>דף גמרא מספריא</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="assets/site.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark" aria-hidden="true">
        <svg viewBox="0 0 24 24" focusable="false">
          <path d="M5 4.5h7a4 4 0 0 1 4 4v11a3 3 0 0 0-3-3H5z"></path>
          <path d="M19 4.5h-7a4 4 0 0 0-4 4v11a3 3 0 0 1 3-3h8z"></path>
        </svg>
      </span>
      <div>
        <h1>דף גמרא</h1>
        <p id="subtitle">טעינה מספריא לתצוגת וילנא בדפדפן</p>
      </div>
    </div>
    <a class="source-link" href="https://www.sefaria.org" target="_blank" rel="noreferrer" aria-label="פתח את Sefaria">
      <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path d="M7 7h10v10"></path>
        <path d="M7 17 17 7"></path>
      </svg>
      <span>Sefaria</span>
    </a>
  </header>

  <main>
    <section class="reader-toolbar" aria-label="בחירת דף ואפשרויות">
      <div class="controls">
        <label>
          <span>מסכת</span>
          <select id="tractate"></select>
        </label>

        <label>
          <span>דף</span>
          <select id="daf-select"></select>
        </label>

        <label>
          <span>עמוד</span>
          <select id="amud">
            <option value="a">א</option>
            <option value="b">ב</option>
          </select>
        </label>

        <button id="load" class="primary-action" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M5 12h14"></path>
            <path d="m12 5 7 7-7 7"></path>
          </svg>
          <span>הצג</span>
        </button>
      </div>

      <nav class="pager" aria-label="ניווט דפים">
        <button id="prev" class="icon-button" type="button" aria-label="הדף הקודם">
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="m9 18 6-6-6-6"></path>
          </svg>
          <span>הקודם</span>
        </button>
        <div id="status" role="status" aria-live="polite">מוכן</div>
        <button id="next" class="icon-button" type="button" aria-label="הדף הבא">
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="m15 18-6-6 6-6"></path>
          </svg>
          <span>הבא</span>
        </button>
      </nav>

      <div class="display-options">
        <div class="zoom-control" aria-label="גודל תצוגת הדף">
          <button id="zoom-out" class="icon-button" type="button" aria-label="הקטן תצוגה">
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M5 12h14"></path>
            </svg>
          </button>
          <label class="zoom-slider-label">
            <span>גודל</span>
            <input id="zoom-range" type="range" min="70" max="140" step="5" value="100">
          </label>
          <button id="zoom-in" class="icon-button" type="button" aria-label="הגדל תצוגה">
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M12 5v14"></path>
              <path d="M5 12h14"></path>
            </svg>
          </button>
          <span id="zoom-value" class="zoom-value" aria-live="polite">100%</span>
        </div>

        <button id="toggle-vowels" class="secondary-action" type="button" aria-pressed="true">
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12Z"></path>
            <path d="M12 9.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5Z"></path>
          </svg>
          <span id="toggle-vowels-label">הסתר ניקוד</span>
        </button>
      </div>
    </section>

    <section class="daf-shell" aria-label="תצוגת הדף">
      <div id="daf-stage" class="daf-stage">
        <div id="daf-container">
          <div id="daf-heading" class="daf-heading" data-amud="a">
            <div id="daf-ref-label" class="daf-ref-label"></div>
            <div id="chapter-label" class="chapter-label"></div>
          </div>
          <div id="daf-render"></div>
        </div>
      </div>
    </section>
  </main>

  <script type="module" src="assets/app.js"></script>
</body>
</html>
